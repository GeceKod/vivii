name: Fetch VAVOO Data and Save to GitHub

on:
  schedule:
    - cron:   # Her gün gece yarısı çalışır
  workflow_dispatch:  # Manuel çalıştırma için

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run VAVOO data fetch script
        run: |
          for i in {1..3}; do
            python vavoo_fetch_and_save.py && break
            echo "Hata oluştu, $i. deneme..."
            sleep 60
          done

      - name: Generate M3U file
        run: |
          python generate_m3u.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add vavoo_tv_channels.json vavoo.m3u
          git commit -m "Update VAVOO TV channels data and M3U" || echo "No changes to commit"
          git remote set-url origin https://x:${GITHUB_TOKEN}@github.com/GeceKod/vavoo.git
          git push
